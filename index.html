<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Pre-Order Pura Masilang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2980b9;
            --primary-gradient: linear-gradient(135deg, #3498db, #2c3e50);
            --success-gradient: linear-gradient(135deg, #11998e, #38ef7d);
            --danger-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --warning-gradient: linear-gradient(135deg, #f12711, #f5af19);
            --panel-left: linear-gradient(180deg, #1f2d3d 0%, #111923 100%);
            --gold: #d4af37;
            --gold-hover: #aa882c;
            --dark-blue: #0f172a;
            --light-bg: #f8fafc;
            --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --neon-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-bg); color: #334155; margin: 0; padding: 25px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* HEADER UTAMA ELEGAN */
        .app-header { text-align: center; margin-bottom: 35px; background: var(--panel-left); padding: 30px 20px; border-radius: 16px; box-shadow: var(--card-shadow); border-bottom: 4px solid var(--gold); position: relative; overflow: hidden; }
        .app-header::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); pointer-events: none; }
        .app-header h2 { margin: 0; color: #ffffff; font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .app-header h3 { margin: 8px 0 0 0; color: #94a3b8; font-size: 15px; font-weight: 400; letter-spacing: 0.5px; }

        /* STYLE HALAMAN LOGIN PREMIUM */
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-container { width: 100%; max-width: 400px; background: white; padding: 40px 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15); border-top: 6px solid var(--gold); text-align: center; }
        .login-icon { width: 75px; height: 75px; background: #fffbeb; color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; font-size: 32px; border: 2px solid #fef3c7; }
        .login-container h2 { margin-bottom: 5px; font-size: 24px; color: var(--dark-blue); font-weight: 800; }
        .login-input-group { position: relative; margin: 20px 0; }
        .login-input-group i { position: absolute; left: 16px; top: 16px; color: #94a3b8; font-size: 16px; }
        .login-input { width: 100%; padding: 14px 14px 14px 48px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 15px; transition: all 0.3s ease; background: #f8fafc; }
        .login-input:focus { border-color: var(--gold); outline: none; background: white; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15); }
        .btn-login { width: 100%; background: var(--panel-left); color: var(--gold); border: 2px solid var(--gold); padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-login:hover { background: var(--gold); color: var(--dark-blue); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        /* DASHBOARD DENGAN WARNA GRADASI GRADIENT */
        #app-content { display: none; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .card { padding: 22px; border-radius: 16px; display: flex; align-items: center; gap: 20px; box-shadow: var(--card-shadow); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: white; position: relative; overflow: hidden; border: none; }
        .card::after { content: ""; position: absolute; right: -15px; bottom: -15px; font-size: 90px; color: rgba(255, 255, 255, 0.08); font-family: "Font Awesome 5 Free"; font-weight: 900; pointer-events: none; }
        .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .card-icon { width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); }
        .card-info { flex: 1; z-index: 1; }
        .card-info .title { font-size: 12px; color: rgba(255, 255, 255, 0.75); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
        .card-info .value { font-size: 22px; font-weight: 800; }
        
        .c-masuk { background: var(--success-gradient); } .c-masuk::after { content: "\f53d"; }
        .c-hutang { background: var(--danger-gradient); } .c-hutang::after { content: "\f571"; }
        .c-total { background: var(--primary-gradient); } .c-total::after { content: "\f201"; }
        .c-qty { background: var(--warning-gradient); } .c-qty::after { content: "\f553"; }

        /* LAYOUT DUA KOLOM DENGAN PERPADUAN KONTRAS WARNA MAJU */
        .main-layout { display: flex; gap: 0; margin-bottom: 35px; border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.05); }
        .input-panel { flex: 4; background: var(--panel-left); padding: 35px; box-sizing: border-box; color: #f8fafc; border-right: 2px solid var(--gold); }
        .cart-panel { flex: 6; background: white; padding: 35px; box-sizing: border-box; }
        
        .panel-title { font-size: 20px; font-weight: 800; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .cart-panel .panel-title { color: var(--dark-blue); border-bottom-color: #f1f5f9; }
        .input-panel .panel-title { color: var(--gold); }

        .form-group { margin-bottom: 22px; }
        label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; letter-spacing: 0.3px; }
        .input-panel label { color: #cbd5e1; }
        .cart-panel label { color: #475569; }
        
        input, select { width: 100%; padding: 13px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 14px; background: white; transition: all 0.3s; }
        .input-panel input, .input-panel select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); color: white; }
        .input-panel input:focus, .input-panel select:focus { border-color: var(--gold); outline: none; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .cart-panel input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15); }
        
        /* SIZE BUTTONS BERWARNA */
        .size-container { display: flex; gap: 10px; margin-top: 5px; }
        .size-btn { flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); cursor: pointer; border-radius: 10px; font-weight: bold; color: #cbd5e1; transition: all 0.2s; }
        .size-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .size-btn.active { background: var(--gold); color: var(--dark-blue); border-color: var(--gold); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        
        /* TOMBOL SELEKSI */
        button.btn-cart { width: 100%; background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 14px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; margin-top: 10px; }
        button.btn-cart:hover { background: var(--gold); color: var(--dark-blue); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        
        button.btn-save { width: 100%; background: var(--success-gradient); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); transition: all 0.3s; }
        button.btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4); }
        
        /* TABLES DENGAN HEAD BERWARNA ELEGAN */
        .table-responsive { overflow-x: auto; background: white; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: var(--card-shadow); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13.5px; }
        th, td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
        th { background: var(--panel-left); color: #ffffff; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 3px solid var(--gold); }
        tr:last-child td { border-bottom: none; }
        
        /* SETTING STRUK BELANJA KASIR */
        #tabel-keranjang tr:hover { background: #fcfcfc; }
        #tabel-master tr:hover { background: #f8fafc; }

        /* LAPORAN CARD VIEW (MOBILE) */
        .mobile-card-container { display: none; flex-direction: column; gap: 16px; }
        .mobile-card { background: white; border-radius: 16px; padding: 18px; box-shadow: var(--card-shadow); border-left: 6px solid var(--primary); border: 1px solid #e2e8f0; border-left: 6px solid var(--primary); }
        .m-card-header { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 14.5px; color: var(--dark-blue); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 12px; }
        .m-card-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13.5px; color: #475569; }

        .row-actions { display: flex; gap: 15px; margin: 40px 0 20px 0; align-items: center; justify-content: space-between; }
        button.btn-export { background: #475569; color: white; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        button.btn-export:hover { background: #334155; }
        button.clear-btn { background: #fee2e2; color: var(--danger); padding: 12px 20px; border: 1px solid #fecaca; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        button.clear-btn:hover { background: var(--danger); color: white; }
        
        .delete-btn { background: #fee2e2; color: var(--danger); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .delete-btn:hover { background: var(--danger); color: white; }
